[package]
name = "sim-nest"
version = "0.1.23"
edition = "2024"
license = "MPL-2.0"
description = "The SIM constellation umbrella facade: one crate that re-exports the runtime kernel, codecs, number domains, and libraries behind features."
readme = "README.md"
publish = true
repository = "https://github.com/sim-nest/sim-sdk"
homepage = "https://github.com/sim-nest/sim-sdk"
keywords = ["sim", "runtime", "kernel", "codec", "plugin"]
categories = ["development-tools", "wasm", "encoding"]

# The umbrella's value is "everything behind features", so docs.rs must build with
# all features or the re-exports are invisible on the crate's primary discovery
# surface. The facade is thin re-exports, so an all-features doc build is cheap.
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

# Published to crates.io as `sim-nest` (the name `sim` is taken), but the library
# import identifier stays `sim` so the proc-macros (which emit `::sim::` paths) and
# every `use sim::...` keep working unchanged. Consumers write
# `sim = { package = "sim-nest", ... }`.
[lib]
name = "sim"

[workspace]
resolver = "3"
members = [
  ".",
  "xtask",
]
# sim-conformance is the deferred (publish=false) full-constellation conformance
# suite; several of its tests collect recipes/manifests from the meta-workspace or
# sibling repos, which do not exist in a standalone checkout. Exclude it from this
# workspace so per-repo CI stays green; the maintainer meta-workspace still builds
# and runs it (via repos.toml source_paths).
exclude = [
  "crates/sim-conformance",
]

[workspace.package]
edition = "2024"
license = "MPL-2.0"
repository = "https://github.com/sim-nest/sim-sdk"
homepage = "https://github.com/sim-nest/sim-sdk"

[workspace.lints.rust]
unsafe_code = "forbid"

[dependencies]
proc-macro2 = { version = "1", features = ["span-locations"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
