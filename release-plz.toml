# Release automation runs per repository. Each repository versions on its own
# cadence, while `^0.1.x` consumers resolve compatible patches from crates.io.
# Non-publishable harness crates keep `publish = false` and are skipped by
# release-plz.
[workspace]
# One version within THIS repo's workspace (facade + xtask bump together).
dependencies_update = true
git_release_enable = true
# Publish crates in dependency order (release-plz computes the order).
